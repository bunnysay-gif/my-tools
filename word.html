<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자수 세기 - PANDORA TOOLS</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3130941392990267"
     crossorigin="anonymous"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #1e1b4b, #4338ca);
            color: white; 
            font-family: '맑은 고딕', sans-serif; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 { text-align: center; font-size: 2rem; margin-bottom: 30px; }
        
        /* 텍스트 입력창 */
        textarea {
            width: 100%;
            height: 350px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.1rem;
            color: #1e293b;
            resize: none;
            box-sizing: border-box;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 결과 보드 (네이버 스타일 정렬) */
        .result-board {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .result-item { text-align: center; }
        .result-item span { display: block; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 10px; }
        .result-item strong { font-size: 2.2rem; color: #fbbf24; }
        .result-item small { font-size: 1.1rem; color: #fbbf24; margin-left: 5px; }
        .byte-info { font-size: 0.85rem; color: #94a3b8; margin-top: 5px; }

        /* 버튼 영역 */
        .btn-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-reset { background: #ef4444; color: white; }
        .btn-reset:hover { background: #dc2626; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 12px 25px; }
        .btn-back:hover { background: rgba(255,255,255,0.3); }

        footer { margin-top: 40px; opacity: 0.6; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✍️ 글자수 세기</h1>
        
        <textarea id="userInput" placeholder="텍스트를 입력하거나 붙여넣으세요. 실시간으로 글자수가 계산됩니다."></textarea>

        <div class="result-board">
            <div class="result-item">
                <span>공백 포함</span>
                <strong id="charCount">0</strong><small>자</small>
                <div class="byte-info" id="byteCount">0 byte</div>
            </div>

            <div style="width: 1px; background: rgba(255,255,255,0.1);"></div>

            <div class="result-item">
                <span>공백 제외</span>
                <strong id="charNoSpaceCount">0</strong><small>자</small>
                <div class="byte-info" id="byteNoSpaceCount">0 byte</div>
            </div>
        </div>

        <div class="btn-area">
            <button class="btn btn-reset" onclick="resetText()">초기화</button>
            <a href="index.html" class="btn btn-back">🏠 대문으로</a>
        </div>
    </div>

    <footer>&copy; 2026 PANDORA TOOLS. All Rights Reserved.</footer>

    <script>
        const userInput = document.getElementById('userInput');
        const charCount = document.getElementById('charCount');
        const byteCount = document.getElementById('byteCount');
        const charNoSpaceCount = document.getElementById('charNoSpaceCount');
        const byteNoSpaceCount = document.getElementById('byteNoSpaceCount');

        // 바이트 계산 함수 (한글 2byte, 나머지 1byte)
        function getByteLength(str) {
            let byte = 0;
            for (let i = 0; i < str.length; i++) {
                // 한글 유니코드 범위 체크
                byte += (str.charCodeAt(i) > 127) ? 2 : 1;
            }
            return byte;
        }

        userInput.addEventListener('input', () => {
            const text = userInput.value;
            const textNoSpace = text.replace(/\s/g, ""); // 모든 공백 제거

            // 1. 공백 포함 계산
            charCount.innerText = text.length;
            byteCount.innerText = getByteLength(text) + ' byte';

            // 2. 공백 제외 계산
            charNoSpaceCount.innerText = textNoSpace.length;
            byteNoSpaceCount.innerText = getByteLength(textNoSpace) + ' byte';
        });

        function resetText() {
            userInput.value = '';
            userInput.dispatchEvent(new Event('input'));
            userInput.focus();
        }
    </script>
</body>
</html>
