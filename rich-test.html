<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 재물운(부자 관상) 테스트 - PANDORA TOOLS</title>
    <style>
        /* 기본 테마 (돈, 재물을 상징하는 골드 톤 믹스) */
        body { 
            background: linear-gradient(135deg, #1e1b4b, #422006);
            color: white; font-family: '맑은 고딕', sans-serif; 
            padding: 20px; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .container {
            max-width: 600px; width: 100%;
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 40px 30px; border-radius: 20px;
            text-align: center; box-sizing: border-box;
            margin-top: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.8rem; color: #eab308; margin-bottom: 10px; }
        .subtitle { color: #d4d4d8; font-size: 1rem; margin-bottom: 30px; word-break: keep-all; }

        /* 진행률 바 */
        .progress-bar {
            width: 100%; height: 10px; background-color: rgba(255,255,255,0.1);
            border-radius: 5px; margin-bottom: 30px; overflow: hidden;
        }
        .progress {
            height: 100%; background-color: #eab308; width: 0%;
            transition: width 0.3s ease;
        }

        /* 퀴즈 영역 */
        #quiz-section { display: block; }
        .question { font-size: 1.25rem; font-weight: bold; margin-bottom: 30px; color: #fff; word-break: keep-all; line-height: 1.5; }
        
        .btn-answer {
            display: block; width: 100%; padding: 15px 20px; margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: white; font-size: 1rem; cursor: pointer;
            transition: 0.2s; word-break: keep-all; text-align: left;
        }
        .btn-answer:hover {
            background-color: rgba(234, 179, 8, 0.2);
            border-color: #eab308; transform: translateY(-2px);
        }

        /* 결과 영역 */
        #result-section { display: none; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .grade { font-size: 3rem; font-weight: bold; margin: 15px 0; text-shadow: 0 0 20px rgba(234, 179, 8, 0.8); color: #fef08a; word-break: keep-all; }
        .result-title { font-size: 1.2rem; margin-bottom: 15px; color: #facc15; }
        .result-desc { color: #e2e8f0; line-height: 1.6; margin-bottom: 30px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px; text-align: left; }

        /* 하단 버튼 */
        .action-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-share {
            background: linear-gradient(135deg, #eab308, #a16207); border: none;
            padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-share:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(234, 179, 8, 0.5); }
        
        .btn-home {
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 25px; border-radius: 25px; color: white; text-decoration: none; font-weight: bold;
            transition: 0.3s; display: inline-block;
        }
        .btn-home:hover { background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

    <div class="container">
        <h1>🤑 나의 재물운 (부자 관상) 테스트</h1>
        <p class="subtitle">나는 언제쯤 부자가 될 수 있을까? 팩폭 소비 습관 진단기</p>

        <div id="quiz-section">
            <div class="progress-bar"><div class="progress" id="progress"></div></div>
            <div class="question" id="question-text">질문이 여기에 표시됩니다.</div>
            <div id="answer-buttons">
                </div>
        </div>

        <div id="result-section">
            <div class="result-title" id="result-title">나의 재물운 등급은...</div>
            <div class="grade" id="result-grade">숨만 쉬어도 돈이 붙는 관상</div>
            <div class="result-desc" id="result-desc">설명이 여기에 표시됩니다.</div>
            
            <div class="action-btns">
                <button class="btn-share" onclick="shareResult()">단톡방에 내 재물운 뽐내기 (또는 오열하기)</button>
                <button class="btn-home" style="background: rgba(255,255,255,0.1);" onclick="location.reload()">새로운 문제로 다시 하기</button>
                <a href="index.html" class="btn-home">홈으로</a>
            </div>
        </div>
    </div>

    <script>
        // 빅데이터 기반 100문제 풀 (각 지표별 25문제)
        const richPool = {
            // [1. 소비/지출 습관 지표 - S(절약/계획) vs Y(욜로/충동)]
            SPEND: [
                { q: "월급이 들어오면 가장 먼저 하는 행동은?", S: "카드값, 고정 지출, 적금부터 칼같이 빼둔다.", Y: "'고생한 나를 위한 선물'이라며 평소 사고 싶던 것부터 결제한다." },
                { q: "친구들과 밥을 먹고 계산할 때 나는 주로?", S: "철저하게 1원 단위까지 더치페이 하거나 각자 결제한다.", Y: "'오늘은 내가 쏠게!' 기분 좋게 카드를 긁고 나중에 살짝 후회한다." },
                { q: "편의점에 물 한 병을 사러 들어갔다.", S: "정말 물만 하나 딱 집어서 바로 계산하고 나온다.", Y: "2+1 행사나 신상 과자가 보이면 나도 모르게 장바구니에 담는다." },
                { q: "배달 음식을 시킬 때 배달비가 5천 원이라면?", S: "미쳤다며 당장 앱을 끄고 직접 포장하러 가거나 집밥을 먹는다.", Y: "비싸긴 하지만 귀찮으니 눈 딱 감고 결제한다." },
                { q: "나의 한 달 고정 지출(통신비, 구독료 등)을 정확히 알고 있나?", S: "당연히 100원 단위까지 정확히 파악하고 있다.", Y: "대충 얼마 나가는지 짐작만 할 뿐, 정확히 계산해 본 적 없다." },
                { q: "사고 싶은 20만 원짜리 운동화가 생겼다.", S: "세일 기간을 기다리거나, 중고 마켓을 며칠 동안 뒤져본다.", Y: "내 사이즈 품절될까 봐 당장 무이자 할부로 긁는다." },
                { q: "넷플릭스, 유튜브 프리미엄 등 구독 서비스는?", S: "파티원을 구해서 n분의 1로 칼같이 나눠서 본다.", Y: "파티원 구하기도 귀찮고 해서 그냥 내 돈 다 내고 편하게 본다." },
                { q: "출근길(또는 등굣길) 모닝커피는?", S: "집에서 카누/티백을 타 가거나, 1500원짜리 저가 커피만 마신다.", Y: "무조건 스벅이나 감성 카페에서 라떼/시그니처 음료를 사 마신다." },
                { q: "통장에 잔고가 5만 원 남았다. 며칠 뒤가 월급날이라면?", S: "절대 돈을 쓰지 않고 5만 원 안에서 악착같이 버틴다.", Y: "어차피 월급 들어올 테니 신용카드나 비상금을 당겨 쓴다." },
                { q: "할인 마트나 다이소에 가면?", S: "꼭 사야 할 물건이 적힌 메모장만 보고 그것만 사서 나온다.", Y: "'오 이거 신기하네? 싸니까 사보자'라며 카트를 가득 채운다." },
                { q: "택시를 타는 기준은?", S: "진짜 죽을 것 같거나 늦었을 때만 탄다. 웬만하면 대중교통.", Y: "걷기 귀찮거나 날씨가 조금만 안 좋아도 숨 쉬듯 택시를 부른다." },
                { q: "옷장에 옷은 많은데 입을 옷이 없다면?", S: "있는 옷들을 어떻게든 매치해서 돌려 입는다.", Y: "'이번 주말 약속엔 새 옷 입어야지' 하며 쇼핑 앱을 켠다." },
                { q: "가계부나 소비 지출 앱을 쓰고 있는가?", S: "매일 영수증을 확인하며 꼼꼼하게 기록하고 피드백한다.", Y: "쓰다가 귀찮아서 포기했거나, 아예 쳐다보지도 않는다." },
                { q: "스트레스를 심하게 받았을 때 푸는 방법은?", S: "집에서 푹 자거나, 혼자 산책하며 돈 안 드는 힐링을 한다.", Y: "매운 거 폭식! 인터넷 쇼핑 폭발! '시발비용'을 팍팍 쓴다." },
                { q: "신용카드 할부에 대한 나의 생각은?", S: "할부는 빚의 시작이다. 무조건 일시불로만 결제한다.", Y: "할부 안 하면 바보지. 무이자 할부는 내 삶의 원동력이다." },
                { q: "호캉스를 가게 되었다. 호텔을 고르는 기준은?", S: "가성비 좋고 조식 포함에 할인 쿠폰 적용되는 실속 있는 곳.", Y: "비싸더라도 인스타 감성 터지고 뷰가 끝내주는 5성급 호텔." },
                { q: "나의 핸드폰 요금제는?", S: "알뜰폰으로 갈아타서 한 달에 1~2만 원대 요금을 쓴다.", Y: "약정 걸고 데이터 무제한 요금제! 기기값 포함하면 10만 원 훌쩍." },
                { q: "머리(미용실)를 할 때 지출은?", S: "동네 미용실이나 커트만 가볍게 치며 비용을 최소화한다.", Y: "유명 디자이너에게 클리닉, 펌, 염색 등 돈을 아끼지 않는다." },
                { q: "여행을 갈 때 밥값은 어떻게 쓰나?", S: "미리 정해둔 예산 안에서 맛집과 가성비를 적절히 섞는다.", Y: "여행 와선 돈 아끼는 거 아니다! 먹고 싶은 거 가격 안 보고 다 시킨다." },
                { q: "친구 생일 선물을 고를 때", S: "정해진 예산 안에서 가장 실용적인 기프티콘이나 선물을 준다.", Y: "돈이 좀 오버되더라도 무조건 뽀대나고 좋은 걸로 사준다." },
                { q: "1+1이나 타임 세일을 보면", S: "당장 필요 없는 거면 아무리 싸도 안 산다.", Y: "일단 사두면 언젠간 쓰겠지! 쟁여두는 게 이득이라며 산다." },
                { q: "나의 현재 비상금 상태는?", S: "갑자기 회사에서 잘려도 3~6개월은 버틸 비상금이 있다.", Y: "비상금이 어딨어? 이번 달 통장 잔고 0원 안 되면 다행이다." },
                { q: "술자리에서 안주를 고를 때", S: "가성비 좋은 탕이나 튀김 하나 시켜놓고 술 위주로 마신다.", Y: "먹고 싶은 안주 3~4개씩 깔아놓고 남기더라도 풍족하게 먹는다." },
                { q: "최신 아이폰/갤럭시가 출시되었다!", S: "내 폰이 고장 나서 안 켜질 때까지 버티다가 바꾼다.", Y: "무조건 사전 예약! 얼리어답터로서 새 폰은 못 참는다." },
                { q: "돈에 대한 나의 평소 생각은?", S: "돈은 아끼고 굴려야 하는 소중한 내 자산이다.", Y: "돈은 쓰라고 있는 것! 죽을 때 싸 들고 갈 것도 아닌데." }
            ],
            // [2. 투자/위험 감수 지표 - I(투자/리스크) vs S(안전/저축)]
            INVEST: [
                { q: "여윳돈 1,000만 원이 생겼다. 어떻게 할까?", I: "유망한 주식, 코인, 부동산 등에 공격적으로 전액 투자한다.", S: "원금 손실은 절대 안 돼! 안전하게 예금이나 적금에 묶어둔다." },
                { q: "주위에서 '이 주식 무조건 오른다'라는 특급 소스를 들었다.", I: "귀가 솔깃해져서 차트를 분석해 보고 일단 조금이라도 사본다.", S: "남들이 다 아는 정보는 끝물이다. 쳐다보지도 않는다." },
                { q: "내가 산 주식/코인이 하루 만에 -20%가 되었다.", I: "이건 세일 기간이다! 물타기(추가 매수)를 시전한다.", S: "심장이 쿵쾅거리고 밥도 안 넘어가서 눈물을 머금고 손절한다." },

                { q: "친구들과 여행 가서 쓴 공동경비를 정산할 때", T: "엑셀이나 정산 앱을 켜서 술 안 마신 사람, 밥 안 먹은 사람 다 분류한다.", F: "귀찮게 뭘 나눠? 그냥 전체 금액 1/n 하고 끝낸다." },
                { q: "조카나 어린 사촌 동생들에게 세뱃돈/용돈을 줄 때", T: "나이별로 철저하게 시세를 맞춰서 딱 정해진 금액만 준다.", F: "애들이 예쁘면 지갑 있는 돈 다 털어서 쥐여준다." },
                { q: "누군가 내 돈 5만 원을 떼먹고 잠수 탔다.", T: "경찰에 신고하고 소액 심판 청구라도 해서 끝까지 받아낸다.", F: "액땜한 셈 치자... 귀찮아서 그냥 똥 밟았다고 생각하고 포기한다." },
                { q: "동료가 일찍 퇴근하려고 내게 일을 떠넘기고 간다면?", T: "'네 일은 네가 해라' 단칼에 거절하고 퇴근해 버린다.", F: "불만은 있지만 거절 못 해서 혼자 야근하며 다 처리해 준다." },
                { q: "로또 1등에 당첨되었다는 사실을 숨길 수 있을까?", T: "당연하다. 내 부모, 배우자에게도 절대 비밀로 하고 입을 닫는다.", F: "입이 간지러워서 결국 가장 친한 사람들에게 술 사며 털어놓는다." },
                { q: "나의 씀씀이에 대한 주변 사람들의 평가는?", T: "'넌 참 알뜰하고 야무지게 돈 쓴다' (혹은 구두쇠다)", F: "'넌 참 호탕하고 돈 잘 쓴다' (혹은 호구다)" },
                { q: "지갑을 주웠는데 안에 현금 100만 원이 있다.", T: "CCTV 확인 후 안 걸릴 것 같으면 꿀꺽한다. (현실주의)", F: "양심에 찔려서 그대로 파출소에 가져다준다. (도덕주의)" },
                { q: "남에게 돈을 쓰는 것에 대해", T: "남에게 쓸 바엔 차라리 나 자신을 위해 쓰는 게 최고다.", F: "내 사람들에게 맛있는 걸 사주고 기뻐하는 걸 보면 나도 행복하다." }
            ]
        };

        let selectedQuestions = []; // 20문제
        let currentIdx = 0;
        let totalScore = 0;

        const quizSec = document.getElementById('quiz-section');
        const resSec = document.getElementById('result-section');
        const qText = document.getElementById('question-text');
        const ansBtns = document.getElementById('answer-buttons');
        const pBar = document.getElementById('progress');

        // 배열 셔플 (피셔-예이츠 알고리즘)
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // 지표 추출기 (각 영역별 5문제씩 = 총 20문제 추출)
        function buildQuestions() {
            const categories = ['SPEND', 'INVEST', 'MIND', 'RELATION'];
            let temp = [];
            
            categories.forEach(cat => {
                let pool = [...richPool[cat]];
                shuffle(pool); // 각 카테고리 섞기
                
                // 5문제만 뽑아서 선택지 섞기
                let picked = pool.slice(0, 5).map(qObj => {
                    let keys = Object.keys(qObj).filter(k => k !== 'q');
                    let ansArr = keys.map(k => {
                        // S, I, M, T 계열은 +10점 부자 마인드 / Y, S, L, F 계열은 +0점 탕진 마인드
                        let s = (k === 'S' && cat !== 'INVEST') || k === 'I' || k === 'M' || k === 'T' ? 10 : 0;
                        return { text: qObj[k], score: s };
                    });
                    shuffle(ansArr); // 버튼 순서 랜덤
                    return { q: qObj.q, answers: ansArr };
                });
                temp.push(...picked);
            });
            
            shuffle(temp); // 전체 20문제 섞기
            selectedQuestions = temp;
        }

        function startTest() {
            totalScore = 0;
            currentIdx = 0;
            buildQuestions();
            
            quizSec.style.display = 'block';
            resSec.style.display = 'none';
            renderQuestion();
        }

        function renderQuestion() {
            const pct = (currentIdx / selectedQuestions.length) * 100;
            pBar.style.width = pct + '%';

            const current = selectedQuestions[currentIdx];
            qText.innerText = `Q${currentIdx + 1}. ${current.q}`;
            
            ansBtns.innerHTML = '';
            current.answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.innerText = ans.text;
                btn.classList.add('btn-answer');
                btn.onclick = () => {
                    totalScore += ans.score;
                    currentIdx++;
                    if (currentIdx < selectedQuestions.length) {
                        renderQuestion();
                    } else {
                        pBar.style.width = '100%';
                        setTimeout(calcResult, 300);
                    }
                };
                ansBtns.appendChild(btn);
            });
        }

        function calcResult() {
            quizSec.style.display = 'none';
            resSec.style.display = 'block';

            const gradeEl = document.getElementById('result-grade');
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');

            // 점수 구간 (20문제 * 10점 = 총 200점 만점)
            if (totalScore >= 160) {
                titleEl.innerText = "👑 상위 1% 타고난 재벌";
                gradeEl.innerText = "숨만 쉬어도 돈이 붙는 관상";
                descEl.innerHTML = "당신은 자본주의의 생리를 완벽하게 꿰뚫고 있는 무서운 사람입니다.<br>철저한 지출 통제와 맹수 같은 투자 감각, 감정에 휘둘리지 않는 냉철함까지 완벽합니다.<br>가끔은 피도 눈물도 없는 구두쇠나 일개미라는 소리를 듣지만, 당신의 통장 잔고는 매일매일 복리로 불어나고 있습니다.<br>10년 뒤 포르쉐를 타며 한강 뷰 아파트에서 웃고 있을 상위 1% 부자 관상입니다!";
            } else if (totalScore >= 110) {
                titleEl.innerText = "💰 든든한 은수저 마인드";
                gradeEl.innerText = "착실하게 부를 쌓아가는 관상";
                descEl.innerHTML = "엄청난 일확천금을 노리진 않지만, 성실함과 꾸준함으로 자산을 불려 나가는 건강한 마인드입니다.<br>쓸 땐 쓰고 아낄 땐 아끼는 균형 감각이 뛰어나며, 리스크 관리도 훌륭합니다.<br>지금처럼만 흔들림 없이 나아간다면 노후 걱정 없는 든든한 경제적 자유를 이룰 확률이 매우 높습니다.";
            } else if (totalScore >= 60) {
                titleEl.innerText = "💸 통장 암살자 욜로족";
                gradeEl.innerText = "돈이 줄줄 새는 밑빠진 독 관상";
                descEl.innerHTML = "삐빅- 통장 잔고에 경고등이 켜졌습니다.<br>돈을 벌기는 하는데, 어디로 갔는지 모르게 다 사라지는 마법을 매달 경험 중이네요.<br>귀가 얇고 감정적인 소비(시발비용, 충동구매)가 많으며, 남들 시선도 은근히 신경 쓰는 타입입니다.<br>부자가 되고 싶다면 당장 배달 앱과 쇼핑 앱부터 지우고 가계부를 쓰기 시작하세요!";
            } else {
                titleEl.innerText = "😭 평생 월급 노예 확정";
                gradeEl.innerText = "빚 안 지면 다행인 호구 관상";
                descEl.innerHTML = "돈보다는 낭만과 관계를 중시하는 따뜻한 사람이지만, 자본주의 사회에선 완벽한 호구(?) 타겟입니다.<br>절약 개념도 부족하고, 얇은 귀 탓에 투자 사기나 보증에 휘말릴 위험이 아주 높습니다.<br>이대로 가다간 평생 뼈 빠지게 일만 하다가 텅 빈 통장만 안고 살아가게 됩니다.<br>제발 통장 쪼개기와 적금부터 당장 시작하세요!";
            }
        }

        // 텍스트 복사 공유 기능
        function shareResult() {
            const resultTitle = document.getElementById('result-title').innerText;
            const resultGrade = document.getElementById('result-grade').innerText;
            const cleanUrl = window.location.href.split('?')[0]; 

            const shareText = `[나의 재물운(부자 관상) 테스트]\n\n🤑 나의 결과: ${resultTitle}\n💸 관상 요약: ${resultGrade}\n\n나는 언제쯤 얼마를 모을 수 있을까?\n너의 부자 관상도 지금 팩폭으로 확인해봐 ㅋㅋㅋ\n👉 ${cleanUrl}`;

            navigator.clipboard.writeText(shareText).then(() => {
                alert("결과가 복사되었습니다!\n단톡방에 '붙여넣기' 하시면 내 재물운 등급이 공유됩니다.");
            }).catch(err => {
                alert("복사에 실패했습니다. 브라우저 설정을 확인해주세요.");
            });
        }

        startTest();
    </script>
</body>
