<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예비 부부 결혼 준비도 - PANDORA TOOLS</title>
    <style>
        /* 기본 테마 (index.html과 통일) */
        body { 
            background: linear-gradient(135deg, #1e1b4b, #2e1065);
            color: white; font-family: '맑은 고딕', sans-serif; 
            padding: 20px; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .container {
            max-width: 600px; width: 100%;
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 40px 30px; border-radius: 20px;
            text-align: center; box-sizing: border-box;
            margin-top: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.8rem; color: #ec4899; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; font-size: 1rem; margin-bottom: 30px; word-break: keep-all; }

        /* 진행률 바 */
        .progress-bar {
            width: 100%; height: 10px; background-color: rgba(255,255,255,0.1);
            border-radius: 5px; margin-bottom: 30px; overflow: hidden;
        }
        .progress {
            height: 100%; background-color: #ec4899; width: 0%;
            transition: width 0.3s ease;
        }

        /* 퀴즈 영역 */
        #quiz-section { display: block; }
        .question { font-size: 1.25rem; font-weight: bold; margin-bottom: 30px; color: #fff; word-break: keep-all; line-height: 1.5; }
        
        .btn-answer {
            display: block; width: 100%; padding: 15px 20px; margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: white; font-size: 1rem; cursor: pointer;
            transition: 0.2s; word-break: keep-all; text-align: left;
        }
        .btn-answer:hover {
            background-color: rgba(236, 72, 153, 0.2);
            border-color: #ec4899; transform: translateY(-2px);
        }

        /* 결과 영역 */
        #result-section { display: none; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .grade { font-size: 5rem; font-weight: bold; margin: 20px 0; text-shadow: 0 0 20px rgba(236, 72, 153, 0.8); }
        .grade-S { color: #facc15; }
        .grade-A { color: #4ade80; }
        .grade-C { color: #fb923c; }
        .grade-F { color: #94a3b8; }

        .result-title { font-size: 1.5rem; margin-bottom: 15px; font-weight: bold; }
        .result-desc { color: #cbd5e1; line-height: 1.6; margin-bottom: 30px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; }

        /* 하단 버튼 */
        .action-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-share {
            background: linear-gradient(135deg, #ec4899, #be185d); border: none;
            padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-share:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(190, 24, 93, 0.5); }
        
        .btn-home {
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 25px; border-radius: 25px; color: white; text-decoration: none; font-weight: bold;
            transition: 0.3s; display: inline-block;
        }
        .btn-home:hover { background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

    <div class="container">
        <h1>💍 예비 부부 결혼 준비도</h1>
        <p class="subtitle">"우리는 진짜 결혼해도 될까?" 현실 200% 멘탈 진단기</p>

        <div id="quiz-section">
            <div class="progress-bar"><div class="progress" id="progress"></div></div>
            <div class="question" id="question-text">질문이 여기에 표시됩니다.</div>
            <div id="answer-buttons">
                </div>
        </div>

        <div id="result-section">
            <div class="grade" id="result-grade">F</div>
            <div class="result-title" id="result-title">환상 속의 그대</div>
            <div class="result-desc" id="result-desc">설명이 여기에 표시됩니다.</div>
            
            <div class="action-btns">
                <button class="btn-share" onclick="shareResult()">예비 배우자에게 결과 보내기</button>
                <button class="btn-home" style="background: rgba(255,255,255,0.1);" onclick="location.reload()">다시 하기 (다른 문제)</button>
                <a href="index.html" class="btn-home">홈으로</a>
            </div>
        </div>
    </div>

    <script>
        // 뼈 때리는 결혼 현실 고증 문제은행 (총 50문제 풀)
        const allQuestions = [
            // [재정 & 돈 관리]
            { q: "결혼 후 월급 관리는 어떻게 할 계획인가요?", answers: [{ text: "통장을 하나로 합쳐서 투명하게 공동 관리한다.", score: 10 }, { text: "생활비 통장만 따로 파고 나머지는 각자 관리한다.", score: 5 }, { text: "내 돈은 내 돈! 터치 없이 완벽하게 각자 관리한다.", score: 0 }] },
            { q: "배우자가 결혼 전 모은 빚(학자금, 마이너스 통장 등)이 있다면?", answers: [{ text: "결혼하면 한 배를 탄 것! 같이 갚아 나간다.", score: 10 }, { text: "본인이 만든 빚이니 각자 알아서 갚아야 한다.", score: 5 }, { text: "빚이 있으면 결혼 자체를 다시 진지하게 고민해 본다.", score: 0 }] },
            { q: "양가 부모님 용돈(어버이날, 명절 등) 금액은 어떻게 정할까요?", answers: [{ text: "무조건 양가 똑같이! 공평하게 맞춘다.", score: 10 }, { text: "각자 집안 사정과 형편에 맞게 유동적으로 드린다.", score: 5 }, { text: "알아서 각자 번 돈으로 자기 부모님을 챙긴다.", score: 0 }] },
            { q: "결혼식 예산이 빠듯하다면, 가장 먼저 줄일 항목은?", answers: [{ text: "스드메(스튜디오/드레스/메이크업) 등 보여주기식 비용", score: 10 }, { text: "예물, 예단, 이바지 등 허례허식", score: 5 }, { text: "신혼여행 (어차피 여행은 나중에도 갈 수 있으니)", score: 0 }] },
            { q: "큰 지출(자동차, 가전 등)을 결정할 때", answers: [{ text: "무조건 상의 후 합의가 100% 될 때만 산다.", score: 10 }, { text: "일단 통보하고 내 돈으로 산다.", score: 5 }, { text: "허락보다 용서가 쉽다. 일단 결제부터 한다.", score: 0 }] },
            { q: "결혼식 축의금, 어떻게 나눌 생각인가요?", answers: [{ text: "양가 부모님 손님 제외, 우리 손님 축의금은 공동 자금으로 쓴다.", score: 10 }, { text: "내 손님은 내 돈, 네 손님은 네 돈. 각자 갖는다.", score: 5 }, { text: "어차피 부모님이 뿌린 돈 걷는 거니 전부 부모님께 드린다.", score: 0 }] },
            { q: "평소 나의 저축 성향은?", answers: [{ text: "철저한 예산 짜기! 선 저축 후 지출 (저축왕)", score: 10 }, { text: "일단 쓸 건 쓰고 남는 돈을 저축한다. (욜로파)", score: 5 }, { text: "저축? 마이너스만 안 나면 다행이다.", score: 0 }] },
            { q: "신혼집을 구할 때 우선순위는?", answers: [{ text: "무리하지 않고 우리 예산에 맞는 작고 실속 있는 집", score: 10 }, { text: "대출을 영끌하더라도 출퇴근 편한 역세권 아파트", score: 5 }, { text: "집은 무조건 크고 예뻐야지! 인테리어 잘 된 신축", score: 0 }] },

            // [가사 분담 & 생활 습관]
            { q: "맞벌이 부부의 이상적인 가사 분담은?", answers: [{ text: "눈에 보이는 사람이 그때그때 알아서 한다.", score: 10 }, { text: "청소, 요리 등 구역을 칼같이 5:5로 나눈다.", score: 5 }, { text: "퇴근이 더 빠른 사람이나 시간 여유 있는 사람이 주로 한다.", score: 0 }] },
            { q: "치약 짜는 습관, 수건 거는 방향 등 사소한 생활 습관이 안 맞는다면?", answers: [{ text: "'그럴 수 있지' 하고 내가 조용히 맞춰주거나 고쳐놓는다.", score: 10 }, { text: "상대방에게 맞춰달라고 지속적으로 대화하며 타협점을 찾는다.", score: 5 }, { text: "내 방식이 맞다며 계속 지적하고 잔소리한다.", score: 0 }] },
            { q: "배우자가 회식/친구 모임으로 밤늦게까지 안 들어온다면?", answers: [{ text: "미리 연락만 잘 되면 터치 안 한다. 자유시간 존중!", score: 10 }, { text: "밤 12시 전에는 무조건 귀가하라고 통금 시간을 정한다.", score: 5 }, { text: "연락도 안 되고 늦으면 현관문 비밀번호를 바꿔버린다.", score: 0 }] },
            { q: "주말 휴식 스타일은?", answers: [{ text: "둘 다 집돌이/집순이! 소파와 한 몸이 되어 배달 음식 먹기", score: 10 }, { text: "무조건 밖으로! 드라이브, 맛집 탐방, 활동적인 데이트", score: 5 }, { text: "서로 다름. 한 명은 나가고 한 명은 집에서 쉬며 각자 시간 보냄", score: 0 }] },
            { q: "나는 아침형 인간인가, 올빼미형 인간인가?", answers: [{ text: "서로 생활 패턴이 달라도 조심하며 배려할 수 있다.", score: 10 }, { text: "생활 패턴이 다르면 각방을 쓰는 것도 고려해 본다.", score: 5 }, { text: "부부라면 무조건 같이 자고 같이 일어나야지! 상대를 바꾼다.", score: 0 }] },
            { q: "요리를 전혀 못 하는 배우자, 식사는 어떻게?", answers: [{ text: "잘하는 사람이 주로 하고, 못하는 사람은 설거지를 전담한다.", score: 10 }, { text: "밀키트나 배달 음식으로 적당히 타협한다.", score: 5 }, { text: "그래도 집밥이 최고! 백종원 유튜브 보고 무조건 해보라고 시킨다.", score: 0 }] },
            { q: "반려동물(강아지, 고양이)을 키우는 문제", answers: [{ text: "둘 다 동물을 사랑하고 끝까지 책임질 자신과 재력이 있다.", score: 10 }, { text: "한 명만 원한다면 털, 배변 문제 등 현실적으로 타협한다.", score: 5 }, { text: "예쁘니까 일단 키우자! 관리는 나중에 생각한다.", score: 0 }] },

            // [가족 관계 & 명절 (시댁/처가)]
            { q: "명절(설/추석) 방문 순서는 어떻게 정할까요?", answers: [{ text: "매년 번갈아 가며 공평하게 먼저 방문한다.", score: 10 }, { text: "가까운 곳이나 사정이 있는 곳부터 유도리 있게 방문한다.", score: 5 }, { text: "전통대로 무조건 본가(시댁) 먼저 갔다가 처가로 간다.", score: 0 }] },
            { q: "양가 부모님이 신혼집 비밀번호를 알려달라고 하신다면?", answers: [{ text: "정중하게 거절하고 방문 전 항상 연락 달라고 말씀드린다.", score: 10 }, { text: "알려드리되, 절대 우리 허락 없이 불쑥 찾아오시지 않게 못 박는다.", score: 5 }, { text: "가족인데 뭐 어때? 편하게 오시라고 알려드린다.", score: 0 }] },
            { q: "배우자와 내 부모님(시댁/처가) 사이에 갈등이 생겼다!", answers: [{ text: "무조건 내 배우자 편에 서서 부모님을 내가 직접 설득하고 차단한다.", score: 10 }, { text: "중간에서 양쪽 말을 다 듣고 합리적인 중재자가 되려 노력한다.", score: 5 }, { text: "어른들 말이 맞지. 배우자에게 참으라고 설득한다.", score: 0 }] },
            { q: "주말마다 시댁/처가에서 같이 밥 먹자고 호출하신다면?", answers: [{ text: "'이번 주는 저희끼리 쉴게요'라고 내 선에서 알아서 커트한다.", score: 10 }, { text: "한 달에 한 번 정도로 횟수를 합의해서 찾아간다.", score: 5 }, { text: "부모님이 부르시는데 당연히 가야지. 배우자 눈치를 본다.", score: 0 }] },
            { q: "부모님이 우리의 자녀 계획, 내 집 마련 등에 심하게 간섭하신다면?", answers: [{ text: "'저희가 알아서 할게요' 라며 부부의 독립적인 결정권을 지킨다.", score: 10 }, { text: "앞에서는 '네 네' 하고 뒤에서는 우리 맘대로 한다.", score: 5 }, { text: "부모님 말씀이 다 피가 되고 살이 된다며 그대로 따른다.", score: 0 }] },
            { q: "양가 제사가 너무 많다면?", answers: [{ text: "결혼했으니 부부끼리 합의해서 제사 참석을 최소화한다.", score: 10 }, { text: "당일치기나 눈도장만 찍고 빨리 빠져나온다.", score: 5 }, { text: "가족 행사인데 며느리/사위로서 도리를 다해 전부 참석한다.", score: 0 }] },

            // [자녀 계획 & 가치관]
            { q: "결혼 후 자녀 계획(2세 계획)에 대한 생각은?", answers: [{ text: "결혼 전부터 몇 명을 언제 낳을지 완벽하게 대화가 끝났다.", score: 10 }, { text: "낳으면 좋고 아님 말고. 자연의 섭리에 맡긴다.", score: 5 }, { text: "무조건 안 낳는다. (합의 없이 혼자만의 생각)", score: 0 }] },
            { q: "아이가 태어난 후 맞벌이 지속 여부는?", answers: [{ text: "육아 휴직을 공평하게 나눠 쓰고 둘 다 커리어를 유지한다.", score: 10 }, { text: "상황을 봐서 한 명이 전업 주부(육아)로 빠진다.", score: 5 }, { text: "양가 부모님께 무조건 황혼 육아를 부탁드린다.", score: 0 }] },
            { q: "배우자의 이성 친구(남사친/여사친) 허용 범위는?", answers: [{ text: "결혼 후에는 오해받을 행동 일절 금지! 단둘이 만나는 건 불가.", score: 10 }, { text: "미리 연락하고 떳떳하게 낮에 밥 먹는 정도는 허용.", score: 5 }, { text: "친구는 친구일 뿐. 밤늦게 술 먹어도 터치 안 한다.", score: 0 }] },
            { q: "부부 싸움을 크게 한 날 밤, 우리는?", answers: [{ text: "화가 나도 한 침대에서 자며 다음 날 아침 대화로 푼다.", score: 10 }, { text: "거실 소파와 안방으로 철저히 각방을 쓴다.", score: 5 }, { text: "친정/본가로 짐 싸서 가출해버린다.", score: 0 }] },
            { q: "비밀번호 공유 (핸드폰, SNS, 개인 계좌)", answers: [{ text: "부부 사이에 비밀은 없다! 원한다면 100% 오픈.", score: 10 }, { text: "필요할 땐 보여주지만, 굳이 서로 감시하려 들진 않는다.", score: 5 }, { text: "가족이라도 프라이버시는 철저히 지켜야지. 절대 공유 불가.", score: 0 }] },
            { q: "갑자기 배우자가 다니던 직장을 관두고 사업을 하겠다고 한다면?", answers: [{ text: "구체적인 사업 계획과 자금 계획을 확인 후 1년간 지켜본다.", score: 10 }, { text: "일단 당신 인생이니 믿어볼게! 라며 쿨하게 허락한다.", score: 5 }, { text: "무슨 소리! 당장 이혼 도장 찍을 준비부터 한다.", score: 0 }] },
            { q: "배우자의 취미 생활 비용이 한 달에 50만 원이라면?", answers: [{ text: "우리 가계 수입 안에서 부담 없다면 서로의 취미를 존중한다.", score: 10 }, { text: "생활비가 쪼들린다면 용돈을 줄여서 타협하게 한다.", score: 5 }, { text: "가정이 우선인데 무슨 개인 취미? 당장 다 끊으라고 한다.", score: 0 }] },
            
            // [위기 상황 & 성향]
            { q: "방귀, 트림 등 생리 현상 트는 것에 대한 생각은?", answers: [{ text: "자연스러운 현상! 유쾌하게 바로 터버린다.", score: 10 }, { text: "실수로는 어쩔 수 없지만 굳이 대놓고 하진 않는다.", score: 5 }, { text: "결혼 생활 내내 완벽한 신비주의를 지킬 것이다.", score: 0 }] },
            { q: "휴가 때 가고 싶은 곳이 극명하게 갈린다면? (휴양지 vs 배낭여행)", answers: [{ text: "올해는 네가 원하는 곳, 내년은 내가 원하는 곳! 쿨하게 합의.", score: 10 }, { text: "반반 섞인 적당한 제3의 타협지를 찾는다.", score: 5 }, { text: "절대 양보 못함. 각자 여행 가거나 휴가를 망친다.", score: 0 }] },
            { q: "배우자가 밤마다 술 한잔(반주)하는 걸 좋아한다면?", answers: [{ text: "서로 안주 챙겨주며 가벼운 반주를 함께 즐긴다.", score: 10 }, { text: "본인 용돈으로 해결하고 술주정만 안 부리면 터치 안 한다.", score: 5 }, { text: "알코올 중독 아냐? 술 냄새나는 것도 꼴 보기 싫다.", score: 0 }] }
        ];

        let questions = []; // 뽑힌 10문제
        let currentQuestionIndex = 0;
        let totalScore = 0;

        const quizSection = document.getElementById('quiz-section');
        const resultSection = document.getElementById('result-section');
        const questionText = document.getElementById('question-text');
        const answerButtons = document.getElementById('answer-buttons');
        const progressBar = document.getElementById('progress');

        // 🎲 배열 섞기 알고리즘
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz() {
            // 전체 풀에서 무작위 10문제만 뽑기
            shuffleArray(allQuestions);
            questions = allQuestions.slice(0, 10); 
            
            currentQuestionIndex = 0;
            totalScore = 0;
            quizSection.style.display = 'block';
            resultSection.style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            // 진행률 업데이트 (10문제 기준)
            const progressPercent = (currentQuestionIndex / questions.length) * 100;
            progressBar.style.width = progressPercent + '%';

            // 질문 세팅
            const currentQuestion = questions[currentQuestionIndex];
            questionText.innerText = `Q${currentQuestionIndex + 1}. ${currentQuestion.q}`;
            
            // 버튼 초기화 및 생성
            answerButtons.innerHTML = '';
            currentQuestion.answers.forEach(answer => {
                const button = document.createElement('button');
                button.innerText = answer.text;
                button.classList.add('btn-answer');
                button.addEventListener('click', () => selectAnswer(answer.score));
                answerButtons.appendChild(button);
            });
        }

        function selectAnswer(score) {
            totalScore += score;
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                // 마지막 문제 응답 시 프로그레스 바 100% 채우기
                progressBar.style.width = '100%';
                setTimeout(showResult, 300);
            }
        }

        function showResult() {
            quizSection.style.display = 'none';
            resultSection.style.display = 'block';
            
            const gradeEl = document.getElementById('result-grade');
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');

            // 점수 구간 (10문제 * 최대 10점 = 총 100점 만점)
            if (totalScore >= 85) {
                gradeEl.innerText = "S";
                gradeEl.className = "grade grade-S";
                titleEl.innerText = "👑 완벽한 예비 부부! 당장 식장 잡으세요";
                descEl.innerHTML = "현실 파악 200% 완료! <br>서로에 대한 존중과 배려, 현실적인 대화가 완벽히 되어 있습니다.<br>어떤 위기가 닥쳐도 두 분이라면 현명하게 헤쳐나갈 수 있겠네요.<br>행복한 꽃길만 걸으세요!";
            } else if (totalScore >= 60) {
                gradeEl.innerText = "A";
                gradeEl.className = "grade grade-A";
                titleEl.innerText = "👍 이 정도면 훌륭해! 현실 타협 완료";
                descEl.innerHTML = "결혼의 쓴맛 단맛을 어느 정도 이해하고 있는 성숙한 어른입니다.<br>가끔 의견 충돌은 있겠지만, 대화로 충분히 풀 수 있는 멘탈을 가졌습니다.<br>조금만 더 서로 양보하면 완벽한 부부가 될 거예요.";
            } else if (totalScore >= 35) {
                gradeEl.innerText = "C";
                gradeEl.className = "grade grade-C";
                titleEl.innerText = "🤔 환상 속에 사는 중... 대화가 시급함";
                descEl.innerHTML = "결혼을 아직 연애의 연장선이나 동화 속 이야기로 생각하고 계시군요?<br>돈 관리, 시댁/처가 문제 등 현실적인 주제로 부딪히면 크게 싸울 확률이 높습니다.<br>결혼 전, 각 잡고 진지한 대화를 나눠보는 걸 추천합니다.";
            } else {
                gradeEl.innerText = "F";
                gradeEl.className = "grade grade-F";
                titleEl.innerText = "🏃‍♂️ 도망쳐! 지독한 솔로/비혼 체질";
                descEl.innerHTML = "삐빅- 아직 남과 인생을 공유할 준비가 1도 안 되었습니다.<br>양보나 타협보다는 '내 방식'이 우선이라, 이대로 결혼하면 매일 밤 전쟁입니다.<br>결혼보다는 당분간 자유로운 싱글 라이프를 즐기는 게 어떨까요?";
            }
        }

        function shareResult() {
            const dummyUrl = window.location.href;
            navigator.clipboard.writeText(dummyUrl).then(() => {
                alert("링크가 복사되었습니다! 예비 배우자나 단톡방에 결과를 공유해 현실을 알려주세요.");
            });
        }

        // 스크립트 로드 시 퀴즈 자동 시작
        startQuiz();
    </script>
</body>
</html>
