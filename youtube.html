<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유튜브 실시간 인기 급상승</title>
    <style>
        body { 
            background-color: #0f0f0f; 
            color: white; 
            font-family: '맑은 고딕', sans-serif; 
            padding: 30px; 
            max-width: 1400px; 
            margin: 0 auto; 
            text-align: center;
        }
        
        h1 { color: #ff0000; margin-bottom: 10px; font-size: 32px; }
        p { color: #aaaaaa; margin-bottom: 40px; }

        /* 3칸씩 알아서 줄바꿈 되도록 설정 (총 6칸이면 2줄이 됩니다!) */
        .board-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
        }

        .category-col {
            background-color: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
        }

        .category-col h2 {
            font-size: 20px;
            margin-top: 0;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .video-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px;
            text-decoration: none;
            color: white;
            text-align: left;
            border-radius: 10px;
            transition: 0.2s;
            margin-bottom: 5px;
        }
        .video-item:hover { background-color: #2a2a2a; transform: scale(1.02); }

        .thumb-box {
            position: relative;
            width: 120px; 
            flex-shrink: 0;
        }
        .thumb-box img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 8px;
        }

        .rank-badge {
            position: absolute;
            top: 4px;
            left: 4px;
            background-color: rgba(229, 9, 20, 0.9);
            color: white;
            padding: 2px 6px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
        }

        .video-info { flex-grow: 1; overflow: hidden; }
        .video-title { 
            font-weight: bold; 
            font-size: 14px; 
            margin-bottom: 4px; 
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .channel-name { color: #aaaaaa; font-size: 12px; margin-bottom: 2px; }
        .view-count { color: #888888; font-size: 11px; }

        .back-btn-container { text-align: center; margin-top: 50px; }
        .back-btn { display: inline-block; padding: 15px 30px; background-color: #3ea6ff; color: #0f0f0f; text-decoration: none; border-radius: 20px; font-weight: bold; transition: 0.2s; }
        .back-btn:hover { background-color: #65b8ff; }

        /* 화면이 좁아지면 가로 2칸 -> 1칸으로 자연스럽게 변신 */
        @media (max-width: 1100px) { .board-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .board-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1>🔥 유튜브 SEO 최적화 실시간 랭킹</h1>
    <p>가장 검색량이 많은 핵심 분야별 대한민국 실시간 TOP 10</p>

    <div class="board-container">
        
        <div class="category-col">
            <h2>🤣 엔터테인먼트 TOP 10</h2>
            <div id="enterContainer"><p style="color:#888;">데이터 불러오는 중...</p></div>
        </div>

        <div class="category-col">
            <h2>⚽ 스포츠 TOP 10</h2>
            <div id="sportsContainer"><p style="color:#888;">데이터 불러오는 중...</p></div>
        </div>

        <div class="category-col">
            <h2>📈 경제/자기계발 TOP 10</h2>
            <div id="eduContainer"><p style="color:#888;">데이터 불러오는 중...</p></div>
        </div>

        <div class="category-col">
            <h2>💻 IT / 과학기술 TOP 10</h2>
            <div id="techContainer"><p style="color:#888;">데이터 불러오는 중...</p></div>
        </div>

        <div class="category-col">
            <h2>🎮 게임 TOP 10</h2>
            <div id="gameContainer"><p style="color:#888;">데이터 불러오는 중...</p></div>
        </div>

        <div class="category-col">
            <h2>🎵 음악 TOP 10</h2>
            <div id="musicContainer"><p style="color:#888;">데이터 불러오는 중...</p></div>
        </div>

    </div>

    <div class="back-btn-container">
        <a href="index.html" class="back-btn">🏠 대문으로 돌아가기</a>
    </div>

    <script>
        // 🔑 중요: 발급받은 API 키를 다시 넣어주세요!
        const API_KEY = 'AIzaSyB6SEMhIsYNBleMCPbMKl-cS8FE3gxxG_Y'; 

        function formatViewCount(views) {
            let num = Number(views);
            if (num >= 100000000) return (num / 100000000).toFixed(1) + '억회';
            if (num >= 10000) return Math.floor(num / 10000) + '만회';
            return num.toLocaleString() + '회';
        }

        async function fetchCategoryRanking(categoryId, containerId) {
            const container = document.getElementById(containerId);
            
            if(API_KEY === 'YOUR_YOUTUBE_API_KEY_HERE') {
                container.innerHTML = '<p style="color: #ff4d4d; text-align: center;">⚠️ API Key를 입력하세요.</p>';
                return;
            }

            try {
                const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=KR&maxResults=10&videoCategoryId=${categoryId}&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                
                let html = '';
                data.items.forEach((video, index) => {
                    let thumbnail = video.snippet.thumbnails.medium ? video.snippet.thumbnails.medium.url : video.snippet.thumbnails.default.url;
                    
                    html += `
                        <a href="https://www.youtube.com/watch?v=${video.id}" target="_blank" class="video-item">
                            <div class="thumb-box">
                                <div class="rank-badge">${index + 1}</div>
                                <img src="${thumbnail}" alt="썸네일">
                            </div>
                            <div class="video-info">
                                <div class="video-title">${video.snippet.title}</div>
                                <div class="channel-name">${video.snippet.channelTitle}</div>
                                <div class="view-count">조회수 ${formatViewCount(video.statistics.viewCount)}</div>
                            </div>
                        </a>
                    `;
                });
                container.innerHTML = html;

            } catch (error) {
                container.innerHTML = '<p style="text-align: center;">데이터를 불러오지 못했습니다.</p>';
            }
        }

        window.onload = function() {
            // 카테고리 고유 번호 설정
            fetchCategoryRanking(24, 'enterContainer');  // 엔터테인먼트
            fetchCategoryRanking(17, 'sportsContainer'); // 스포츠
            fetchCategoryRanking(25, 'eduContainer');    // 25번(뉴스/정치 - 경제 이슈 포함)으로 변경!
            fetchCategoryRanking(28, 'techContainer');   // 과학/기술(IT)
            fetchCategoryRanking(20, 'gameContainer');   // 게임
            fetchCategoryRanking(10, 'musicContainer');  // 음악
        };
    </script>
</body>
</html>
