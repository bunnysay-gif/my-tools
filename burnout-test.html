<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현대인 번아웃 자가 진단기 - PANDORA TOOLS</title>
    <style>
        /* 기본 테마 (지치고 방전된 느낌의 다크 네이비/그레이 톤) */
        body { 
            background: linear-gradient(135deg, #0f172a, #334155);
            color: white; font-family: '맑은 고딕', sans-serif; 
            padding: 20px; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .container {
            max-width: 600px; width: 100%;
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 40px 30px; border-radius: 20px;
            text-align: center; box-sizing: border-box;
            margin-top: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.8rem; color: #64748b; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; font-size: 1rem; margin-bottom: 30px; word-break: keep-all; }

        /* 진행률 바 */
        .progress-bar {
            width: 100%; height: 10px; background-color: rgba(255,255,255,0.1);
            border-radius: 5px; margin-bottom: 30px; overflow: hidden;
        }
        .progress {
            height: 100%; background-color: #64748b; width: 0%;
            transition: width 0.3s ease;
        }

        /* 퀴즈 영역 */
        #quiz-section { display: block; }
        .question { font-size: 1.25rem; font-weight: bold; margin-bottom: 30px; color: #fff; word-break: keep-all; line-height: 1.5; }
        
        .btn-answer {
            display: block; width: 100%; padding: 15px 20px; margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: white; font-size: 1rem; cursor: pointer;
            transition: 0.2s; word-break: keep-all; text-align: left;
        }
        .btn-answer:hover {
            background-color: rgba(100, 116, 139, 0.2);
            border-color: #94a3b8; transform: translateY(-2px);
        }

        /* 결과 영역 */
        #result-section { display: none; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .grade { font-size: 3rem; font-weight: bold; margin: 15px 0; text-shadow: 0 0 20px rgba(100, 116, 139, 0.8); color: #cbd5e1; word-break: keep-all; }
        .result-title { font-size: 1.3rem; margin-bottom: 15px; color: #94a3b8; font-weight: bold; }
        .result-desc { color: #e2e8f0; line-height: 1.6; margin-bottom: 30px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px; text-align: left; }

        .action-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-share {
            background: linear-gradient(135deg, #475569, #1e293b); border: none;
            padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-share:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .btn-home {
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 25px; border-radius: 25px; color: white; text-decoration: none; font-weight: bold;
            transition: 0.3s; display: inline-block;
        }
        .btn-home:hover { background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

    <div class="container">

            <div id="answer-buttons">
                </div>
        </div>

            </div>
        </div>
    </div>

                { q: "목과 어깨가 항상 딱딱하게 뭉쳐서 돌처럼 굳어 있나?", answers: [{ text: "누가 만지면 소리 지를 정도로 뭉침이 심하다.", score: 10 }, { text: "스트레칭하면 좀 풀리는 수준이다.", score: 5 }, { text: "말랑말랑하고 유연하다.", score: 0 }] },

                { q: "입술 주위에 물집이 잡히거나 입안이 자주 허나?", answers: [{ text: "조금만 피곤하면 바로 구내염이 생겨서 음식을 못 먹는다.", score: 10 }, { text: "어쩌다 한 번 피곤할 때만 생긴다.", score: 5 }, { text: "그런 적이 거의 없다.", score: 0 }] },

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // 지표 추출기 (각 영역별 5문제씩 = 총 20문제)
        function buildQuestions() {
            const categories = ['BODY', 'EMOTION', 'CYNICISM', 'ACHIEVE'];
            let temp = [];
            
            categories.forEach(cat => {
                let pool = [...burnoutPool[cat]];
                shuffle(pool);
                let picked = pool.slice(0, 5).map(qObj => {
                    let ansArr = [...qObj.answers];
                    shuffle(ansArr);
                    return { q: qObj.q, answers: ansArr };
                });
                temp.push(...picked);
            });
            
            shuffle(temp);
            selectedQuestions = temp;
        }

        function startTest() {
            totalScore = 0;
            currentIdx = 0;
            buildQuestions();
            
            quizSec.style.display = 'block';
            resSec.style.display = 'none';
            renderQuestion();

        function renderQuestion() {
            const pct = (currentIdx / selectedQuestions.length) * 100;
            pBar.style.width = pct + '%';

            const current = selectedQuestions[currentIdx];
            qText.innerText = `Q${currentIdx + 1}. ${current.q}`;
            
            ansBtns.innerHTML = '';
            current.answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.innerText = ans.text;
                btn.classList.add('btn-answer');
                btn.onclick = () => {
                    totalScore += ans.score;
                    currentIdx++;
                    if (currentIdx < selectedQuestions.length) {
                        renderQuestion();
                    } else {
                        pBar.style.width = '100%';
                        setTimeout(calcResult, 300);
                    }
                };
                ansBtns.appendChild(btn);
            });
        }

                descEl.innerHTML = "직장인과 학생이라면 누구나 겪는 일상적인 피로감입니다.<br>가끔 '현타'가 오긴 하지만 맛있는 거 먹고 주말에 푹 자면 다시 회복 가능한 수준이네요.<br>하지만 방치하면 번아웃으로 발전할 수 있으니 주기적으로 감정을 환기시켜 주세요.<br>틈틈이 소확행을 즐기는 당신, 아주 잘 버티고 있습니다!";
            } else {
                gradeEl.innerText = "⚡ 갓생 사는 완충 상태";
                titleEl.innerText = "열정과 활력이 넘치는 건강한 멘탈";
                descEl.innerHTML = "당신에게 번아웃이란 남의 나라 이야기군요!<br>스트레스 관리 능력이 매우 뛰어나고, 자신의 일을 진심으로 즐기고 있습니다.<br>회복 탄력성이 좋아 실패해도 금방 털어내고 일어나는 건강한 상태입니다.<br>지금의 긍정적인 에너지를 주변 사람들에게도 나눠주세요. 당신은 진정한 갓생러입니다!";
            }
        }

        function shareResult() {
            const grade = document.getElementById('result-grade').innerText;
            const title = document.getElementById('result-title').innerText;
            const cleanUrl = window.location.href.split('?')[0]; 

            const shareText = `[현대인 번아웃 자가 진단]\n\n🔋 나의 방전 상태: ${grade}\n📌 진단 결과: ${title}\n\n요즘 왜 이렇게 피곤한지 궁금해?\n너의 번아웃 지수도 지금 바로 확인해봐!\n👉 ${cleanUrl}`;

            navigator.clipboard.writeText(shareText).then(() => {
                alert("결과가 복사되었습니다!\n단톡방에 '붙여넣기' 하시면 내 상태가 공유됩니다.");
            }).catch(err => {
                alert("복사에 실패했습니다. 브라우저 설정을 확인해주세요.");
            });
        }

        startTest();
    </script>
